<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>YTMusic Lyrics</title>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      background: #0f0f0f;
      color: #fff;
      font-family: 'Roboto', sans-serif;
      font-size: 13px;
    }
    .header {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header-icon {
      font-size: 15px;
      background: linear-gradient(135deg, #8A5CFF, #5EDCFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-title { font-size: 13px; font-weight: 500; letter-spacing: 0.3px; }

    /* ── Player ── */
    .player {
      padding: 14px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    #thumb {
      width: 62px; height: 62px;
      border-radius: 6px;
      object-fit: cover;
      background: #222;
      flex-shrink: 0;
    }
    .song-info { flex: 1; min-width: 0; }
    .song-title {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .song-artist {
      font-size: 12px; color: rgba(255,255,255,0.55);
      margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Progress ── */
    .progress-section { padding: 0 14px 6px; }
    .progress-bg {
      height: 3px; background: rgba(255,255,255,0.15);
      border-radius: 2px; cursor: pointer;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #8A5CFF, #4A90E2, #5EDCFF);
      border-radius: 2px;
      transition: width 0.8s linear;
    }
    .time-row {
      display: flex; justify-content: space-between;
      margin-top: 5px; font-size: 11px;
      color: rgba(255,255,255,0.4);
    }

    /* ── Controls ── */
    .controls {
      display: flex; justify-content: center;
      align-items: center; gap: 28px;
      padding: 6px 14px 14px;
    }
    .ctrl-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.75);
      cursor: pointer; font-size: 18px;
      padding: 4px; line-height: 1;
      transition: color 0.15s, transform 0.1s;
    }
    .ctrl-btn:hover { color: #fff; transform: scale(1.1); }
    .ctrl-btn:active { transform: scale(0.95); }
    #btn-play {
      font-size: 26px; color: #8A5CFF;
      background: rgba(138,92,255,0.15);
      border-radius: 50%; width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
    }
    #btn-play:hover { color: #fff; background: linear-gradient(135deg, #8A5CFF, #4A90E2); }

    /* ── Language ── */
    .lang-row {
      padding: 8px 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; gap: 8px;
    }
    .lang-row label { font-size: 11px; color: rgba(255,255,255,0.45); white-space: nowrap; }
    .lang-row select {
      flex: 1;
      background: #1e1e1e;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px; color: #fff;
      font-size: 12px; padding: 4px 8px;
      cursor: pointer; outline: none;
    }
    .lang-row select option {
      background: #1e1e1e;
      color: #fff;
    }

    /* ── Lyrics ── */
    .lyrics-section {
      border-top: 1px solid rgba(255,255,255,0.08);
      max-height: 280px; overflow-y: auto;
      padding: 12px 14px;
    }
    .lyrics-section::-webkit-scrollbar { width: 3px; }
    .lyrics-section::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2); border-radius: 2px;
    }

    /* ── No song ── */
    .no-song {
      padding: 36px 16px; text-align: center;
      color: rgba(255,255,255,0.35); font-size: 13px; line-height: 1.6;
    }
    .no-song-icon { font-size: 32px; margin-bottom: 10px; display: block; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">♫</span>
    <span class="header-title">YTMusic Lyrics</span>
    <button id="btn-settings" data-i18n-title="settings"
      style="margin-left:auto;background:none;border:none;color:rgba(255,255,255,0.45);
             cursor:pointer;font-size:16px;padding:2px 4px;line-height:1;transition:color 0.15s">⚙</button>
  </div>

  <div id="settings-panel" style="display:none;border-bottom:1px solid rgba(255,255,255,0.08);padding:12px 14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <label data-i18n="orig_color" style="font-size:12px;color:rgba(255,255,255,0.6)">Cor da letra original</label>
      <input type="color" id="color-orig" value="#ffffff"
        style="width:36px;height:26px;border:1px solid rgba(255,255,255,0.2);border-radius:4px;
               cursor:pointer;background:none;padding:1px 2px">
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <label data-i18n="trans_color" style="font-size:12px;color:rgba(255,255,255,0.6)">Cor da tradução</label>
      <input type="color" id="color-trans" value="#7a7a7a"
        style="width:36px;height:26px;border:1px solid rgba(255,255,255,0.2);border-radius:4px;
               cursor:pointer;background:none;padding:1px 2px">
    </div>
    <div style="border-top:1px solid rgba(255,255,255,0.08);margin:10px 0;padding-top:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <label data-i18n="font_size_orig" style="font-size:12px;color:rgba(255,255,255,0.6)">Tamanho letra original</label>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="range" id="size-orig" min="10" max="50" value="14"
            style="width:80px;accent-color:#8A5CFF;cursor:pointer">
          <span id="size-orig-val" style="font-size:11px;color:rgba(255,255,255,0.4);width:26px">14px</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <label data-i18n="font_size_trans" style="font-size:12px;color:rgba(255,255,255,0.6)">Tamanho tradução</label>
        <div style="display:flex;align-items:center;gap:6px">
          <input type="range" id="size-trans" min="10" max="50" value="13"
            style="width:80px;accent-color:#8A5CFF;cursor:pointer">
          <span id="size-trans-val" style="font-size:11px;color:rgba(255,255,255,0.4);width:26px">13px</span>
        </div>
      </div>
    </div>
    <div style="border-top:1px solid rgba(255,255,255,0.08);margin:10px 0;padding-top:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer" id="row-show-orig">
        <input type="checkbox" id="show-orig" checked style="accent-color:#8A5CFF;cursor:pointer;width:14px;height:14px">
        <label for="show-orig" data-i18n="show_orig" style="font-size:12px;color:rgba(255,255,255,0.6);cursor:pointer">Mostrar letra original</label>
      </div>
      <div style="display:flex;align-items:center;gap:8px;cursor:pointer" id="row-show-trans">
        <input type="checkbox" id="show-trans" checked style="accent-color:#8A5CFF;cursor:pointer;width:14px;height:14px">
        <label for="show-trans" data-i18n="show_trans" style="font-size:12px;color:rgba(255,255,255,0.6);cursor:pointer">Mostrar tradução</label>
      </div>
    </div>
    <button id="btn-reset-colors"
      style="width:100%;padding:6px;background:rgba(255,255,255,0.07);
             border:1px solid rgba(255,255,255,0.12);border-radius:6px;
             color:rgba(255,255,255,0.65);font-size:12px;cursor:pointer">
      <span data-i18n="reset">↺ Restaurar padrão</span>
    </button>
  </div>

  <div id="no-song" class="no-song">
    <span class="no-song-icon">🎵</span>
    <span id="no-song-text">Abra o YouTube Music<br>e toque uma música</span>
  </div>

  <div id="player-ui" style="display:none">
    <div class="player">
      <img id="thumb" src="" alt="capa" />
      <div class="song-info">
        <div id="song-title" class="song-title">—</div>
        <div id="song-artist" class="song-artist">—</div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-bg">
        <div id="progress-fill" class="progress-fill" style="width:0%"></div>
      </div>
      <div class="time-row">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="btn-prev" title="Anterior">⏮</button>
      <button class="ctrl-btn" id="btn-play" title="Play/Pause">▶</button>
      <button class="ctrl-btn" id="btn-next" title="Próxima">⏭</button>
    </div>

    <div class="lang-row">
      <label data-i18n="trans_label">Tradução:</label>
      <select id="lang-select">
        <option value="auto">🌐 Auto</option>
        <option value="pt">Português</option>
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="ja">日本語</option>
        <option value="off">Off</option>
      </select>
    </div>

    <div id="lyrics" class="lyrics-section"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
